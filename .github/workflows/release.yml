name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_npm:
        description: 'Publish npm packages if NPM_TOKEN is configured'
        required: false
        default: 'true'

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run contracts:generate
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run docs:build
      - name: Pack packages
        run: |
          mkdir -p artifacts
          pnpm -r --filter './packages/*' pack --pack-destination artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          prerelease: true
          generate_release_notes: true
          files: artifacts/*.tgz
      - name: Publish npm packages
        if: env.NPM_TOKEN != '' && (github.event_name == 'push' || github.event.inputs.publish_npm == 'true')
        run: pnpm -r --filter './packages/*' publish --access public --tag alpha --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Explain skipped npm publish
        if: env.NPM_TOKEN == ''
        run: echo 'NPM_TOKEN is not configured; GitHub release was created, npm publish skipped.'
