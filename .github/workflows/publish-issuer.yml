name: Publish Issuer SDK

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @union-networks/issuer test
      - run: pnpm --filter @union-networks/issuer typecheck
      - run: pnpm --filter @union-networks/issuer build
      - name: Publish issuer package
        run: pnpm --filter @union-networks/issuer publish --access public --tag alpha --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
